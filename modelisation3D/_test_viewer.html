<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visite virtuelle 3D — clic pour orienter, molette pour zoomer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #111;
      user-select: none;
    }

    canvas { display: block; cursor: grab; }
    canvas.dragging { cursor: grabbing; }

    #instructions {
      position: absolute;
      top: 16px;
      left: 16px;
      color: #fff;
      background: rgba(0,0,0,0.45);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.8rem;
      line-height: 1.6;
      z-index: 5;
      max-width: 280px;
    }

    #loading {
      position: absolute;
      inset: 0;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      font-size: 0.95rem;
    }

    #loading .bar {
      width: 240px;
      height: 4px;
      background: #333;
      border-radius: 2px;
      margin-top: 14px;
      overflow: hidden;
    }

    #loading .fill {
      height: 100%;
      width: 0%;
      background: #fff;
      transition: width 0.15s ease-out;
    }

    /* Petit marqueur qui indique brièvement où on a cliqué */
    #click-flash {
      position: absolute;
      width: 24px;
      height: 24px;
      margin: -12px 0 0 -12px;
      border: 2px solid #fff;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      z-index: 5;
    }

    /* ---- Panneaux de contrôle (icônes) ---- */
    .control-panel {
      position: absolute;
      z-index: 10;
      display: grid;
      gap: 6px;
      user-select: none;
    }

    .ctrl-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
    .ctrl-btn:hover { background: rgba(0,0,0,0.7); }
    .ctrl-btn:active, .ctrl-btn.active { background: rgba(255,255,255,0.35); }
    .ctrl-btn svg { width: 22px; height: 22px; pointer-events: none; }

    /* Zoom : bas droite, vertical */
    #zoom-panel {
      right: 16px;
      bottom: 16px;
      grid-template-columns: 1fr;
    }

    /* Déplacement : bas gauche, en croix (D-pad) */
    #move-panel {
      left: 16px;
      bottom: 16px;
      grid-template-columns: repeat(3, 44px);
      grid-template-rows: repeat(3, 44px);
    }
    #move-panel .cell-empty { visibility: hidden; }
    #move-forward { grid-column: 2; grid-row: 1; }
    #move-left    { grid-column: 1; grid-row: 2; }
    #move-reset   { grid-column: 2; grid-row: 2; }
    #move-right   { grid-column: 3; grid-row: 2; }
    #move-back    { grid-column: 2; grid-row: 3; }
  </style>
</head>
<body>

  <div id="loading">
    <div>Chargement du modèle…</div>
    <div class="bar"><div class="fill" id="loading-fill"></div></div>
  </div>

  <div id="instructions">
    <b>Glisser</b> : regarde librement à 360° (souris ou doigt).<br>
    <b>Clic simple</b> : vise directement le point touché.<br>
    <b>Molette</b> : avance / recule vers le pointeur — effet zoom, sans rotation.<br>
    <b>Icônes</b> : zoom (droite), déplacement (gauche), vue initiale (centre).
  </div>

  <div id="click-flash"></div>

  <!-- Zoom avant / arrière -->
  <div class="control-panel" id="zoom-panel">
    <button class="ctrl-btn" id="zoom-in" title="Zoomer" aria-label="Zoomer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <button class="ctrl-btn" id="zoom-out" title="Dézoomer" aria-label="Dézoomer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
  </div>

  <!-- Déplacement dans le modèle + retour à la vue initiale -->
  <div class="control-panel" id="move-panel">
    <button class="ctrl-btn" id="move-forward" title="Avancer" aria-label="Avancer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
    </button>
    <button class="ctrl-btn" id="move-left" title="Aller à gauche" aria-label="Aller à gauche">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="ctrl-btn" id="move-reset" title="Revenir à la vue initiale" aria-label="Revenir à la vue initiale">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 1 2.64 6.36"/><polyline points="3 21 3 15 9 15"/></svg>
    </button>
    <button class="ctrl-btn" id="move-right" title="Aller à droite" aria-label="Aller à droite">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button class="ctrl-btn" id="move-back" title="Reculer" aria-label="Reculer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

    // ---- CONFIG : change le nom de fichier ici ----
    //const MODEL_URL = 'old_house.glb';
    const MODEL_URL = new URLSearchParams(location.search).get('m') || 'ancient_shrine.glb';
    
    
    // ------------------------------------------------

    const EYE_HEIGHT = 1.6;   // hauteur "yeux" au-dessus du sol, avant chargement du modèle
    const HOLD_INTERVAL = 60; // ms entre deux pas quand une icône est maintenue enfoncée

    // Pas de déplacement (molette, zoom, icônes de navigation) : recalculé une fois
    // le modèle chargé, proportionnellement à sa taille réelle (voir placeCameraOutsideModel).
    // Sans ça, un pas fixe serait invisible sur un grand modèle et beaucoup trop
    // rapide sur un petit.
    let dynamicStep = 0.5;

    let camera, scene, renderer;
    let modelGroup = null;
    let raycaster = new THREE.Raycaster();

    // Position/cible initiales (extérieur du bâtiment), calculées après chargement du modèle,
    // et réutilisées par le bouton "revenir à la vue initiale".
    let initialPosition = null;
    let initialTarget = null;

    init();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x88a0b0);
      scene.fog = new THREE.Fog(0x88a0b0, 20, 100);

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, EYE_HEIGHT, 5);
      camera.lookAt(0, EYE_HEIGHT, 0);

      // Lumières
      const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
      scene.add(hemiLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
      dirLight.position.set(5, 10, 7);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.set(2048, 2048);
      dirLight.shadow.camera.near = 0.5;
      dirLight.shadow.camera.far = 50;
      dirLight.shadow.camera.left = -20;
      dirLight.shadow.camera.right = 20;
      dirLight.shadow.camera.top = 20;
      dirLight.shadow.camera.bottom = -20;
      scene.add(dirLight);

      // Renderer
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.0;
      document.body.appendChild(renderer.domElement);

      // Glisser (souris ou doigt) = regarde librement à 360° dans toutes les directions.
      // Un simple clic/tap (sans glissement) vise directement le point touché.
      renderer.domElement.addEventListener('pointerdown', onPointerDown);
      renderer.domElement.addEventListener('pointermove', onPointerMove);
      renderer.domElement.addEventListener('pointerup', onPointerUp);
      renderer.domElement.addEventListener('pointerleave', onPointerUp);

      // Molette = avance/recule d'un pas fixe, sans jamais toucher à la rotation de la caméra
      renderer.domElement.addEventListener('wheel', onWheel, { passive: false });

      renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

      window.addEventListener('resize', onWindowResize);

      // Chargement du modèle
      const dracoLoader = new DRACOLoader();
      dracoLoader.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');

      const loader = new GLTFLoader();
      loader.setDRACOLoader(dracoLoader);

      const loadingScreen = document.getElementById('loading');
      const loadingFill = document.getElementById('loading-fill');

      loader.load(
        MODEL_URL,
        (gltf) => {
          modelGroup = gltf.scene;
          modelGroup.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
              if (child.material) child.material.side = THREE.DoubleSide;
            }
          });
          applyHistoricalColors(modelGroup);
          scene.add(modelGroup);
          placeCameraOutsideModel();
          loadingScreen.style.display = 'none';
        },
        (xhr) => {
          if (xhr.lengthComputable) {
            loadingFill.style.width = (xhr.loaded / xhr.total) * 100 + '%';
          }
        },
        (error) => {
          loadingScreen.innerHTML = `
            <div style="color:#ff8080; max-width:320px; text-align:center;">
              Erreur de chargement du modèle.<br>
              Vérifie que le fichier <b>${MODEL_URL}</b> est bien présent
              à côté de ce fichier HTML, et que tu utilises un serveur local
              (pas file://).
            </div>`;
          console.error(error);
        }
      );

      animate();
    }

    // ---------- Palette « bâtiment historique béninois » ----------
    // Le .glb ne définit une couleur que sur un seul des trois matériaux (les deux
    // autres retombent sur le blanc par défaut du glTF) : on assigne donc une teinte
    // par nom de matériau plutôt que de dépendre d'une texture absente du fichier.

    const HISTORICAL_COLORS_BY_MATERIAL_NAME = {
      'old building': 0xb5651d, // murs en terre/latérite ocre-rouge
      'wood': 0x6b4423,         // poutres, portes, éléments en bois
    };

    function applyHistoricalColors(root) {
      root.traverse((child) => {
        if (!child.isMesh || !child.material) return;
        const materials = Array.isArray(child.material) ? child.material : [child.material];
        materials.forEach((mat) => {
          const hex = HISTORICAL_COLORS_BY_MATERIAL_NAME[mat.name];
          if (hex !== undefined && mat.color) {
            mat.color.setHex(hex);
          }
        });
      });
    }

    // ---------- Place la caméra à l'extérieur du bâtiment au chargement ----------
    // Calcule la boîte englobante du modèle pour déduire une position de départ
    // qui le montre en entier, plutôt qu'une position fixe qui pourrait se
    // retrouver à l'intérieur des murs selon l'échelle du modèle.

    function placeCameraOutsideModel() {
      const box = new THREE.Box3().setFromObject(modelGroup);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      // Distance d'approche : volontairement proche (façade/entrée), pas une vue
      // d'ensemble éloignée — l'utilisateur explore ensuite avec les icônes / la souris.
      const distance = maxDim * 0.35 + 4;

      dynamicStep = Math.max(0.05, maxDim / 50);

      camera.near = Math.max(0.1, maxDim / 500);
      camera.far = Math.max(1000, (maxDim * 1.3 + maxDim) * 4);
      camera.updateProjectionMatrix();

      if (scene.fog) {
        scene.fog.near = maxDim * 0.5;
        scene.fog.far = maxDim * 1.3 + maxDim * 3;
      }

      const lookHeight = center.y + size.y * 0.1;
      camera.position.set(center.x, lookHeight, center.z + distance);
      camera.lookAt(center.x, lookHeight, center.z);

      initialPosition = camera.position.clone();
      initialTarget = new THREE.Vector3(center.x, lookHeight, center.z);
    }

    function resetToInitialView() {
      if (!initialPosition || !initialTarget) return;
      camera.position.copy(initialPosition);
      camera.lookAt(initialTarget);
    }

    // ---------- Calcul de la direction pointée par le curseur (sans toucher à la caméra) ----------

    function getPointerDirection(clientX, clientY) {
      const ndc = new THREE.Vector2(
        (clientX / window.innerWidth) * 2 - 1,
        -(clientY / window.innerHeight) * 2 + 1
      );
      raycaster.setFromCamera(ndc, camera);
      return raycaster.ray.direction.clone().normalize();
    }

    // ---------- Clic : vise directement le point touché (tap/clic sans glissement) ----------

    function aimAt(clientX, clientY) {
      const direction = getPointerDirection(clientX, clientY);
      camera.lookAt(camera.position.clone().add(direction));
      flashAt(clientX, clientY);
    }

    // ---------- Glisser : regarde librement à 360° (yaw illimité, tangage limité) ----------
    // Seule la rotation change ici, jamais la position : conforme à la règle
    // « la molette ne fait jamais tourner la caméra », étendue au glisser.

    const ROTATE_SPEED = 0.0035;
    const PITCH_LIMIT = Math.PI / 2 - 0.01; // évite le flip au zénith/nadir

    let isDragging = false;
    let dragMoved = false;
    let lastPointerX = 0;
    let lastPointerY = 0;
    let yaw = 0;
    let pitch = 0;

    function syncYawPitchFromCamera() {
      const euler = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
      yaw = euler.y;
      pitch = euler.x;
    }

    function onPointerDown(e) {
      isDragging = true;
      dragMoved = false;
      lastPointerX = e.clientX;
      lastPointerY = e.clientY;
      syncYawPitchFromCamera();
      renderer.domElement.classList.add('dragging');
    }

    function onPointerMove(e) {
      if (!isDragging) return;
      const dx = e.clientX - lastPointerX;
      const dy = e.clientY - lastPointerY;
      lastPointerX = e.clientX;
      lastPointerY = e.clientY;

      if (Math.abs(dx) > 2 || Math.abs(dy) > 2) dragMoved = true;
      if (!dragMoved) return;

      yaw -= dx * ROTATE_SPEED;
      pitch -= dy * ROTATE_SPEED;
      pitch = Math.max(-PITCH_LIMIT, Math.min(PITCH_LIMIT, pitch));

      camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
    }

    function onPointerUp(e) {
      if (isDragging && !dragMoved) {
        aimAt(e.clientX, e.clientY);
      }
      isDragging = false;
      dragMoved = false;
      renderer.domElement.classList.remove('dragging');
    }

    // ---------- Molette : avance / recule d'un pas fixe, AUCUNE rotation appliquée ----------

    function onWheel(e) {
      e.preventDefault();

      // Direction vers le pointeur, utilisée uniquement pour la translation.
      // On ne modifie jamais camera.rotation ici : c'est un pur effet de zoom.
      const direction = getPointerDirection(e.clientX, e.clientY);

      if (e.deltaY < 0) {
        // Molette vers l'avant : avance d'un petit pas vers le pointeur (zoom +)
        camera.position.addScaledVector(direction, dynamicStep);
      } else if (e.deltaY > 0) {
        // Molette vers l'arrière : recule d'un petit pas (zoom -)
        camera.position.addScaledVector(direction, -dynamicStep);
      }

      flashAt(e.clientX, e.clientY);
    }

    // ---------- Icônes : zoom, déplacement et retour à la vue initiale ----------
    // Ni le zoom ni le déplacement ne touchent à la rotation de la caméra,
    // pour rester cohérent avec le comportement de la molette et du clic.

    function getForwardFull() {
      const dir = new THREE.Vector3();
      camera.getWorldDirection(dir);
      return dir;
    }

    function getForwardHorizontal() {
      const dir = getForwardFull();
      dir.y = 0;
      if (dir.lengthSq() < 1e-6) dir.set(0, 0, -1);
      return dir.normalize();
    }

    function getRightHorizontal() {
      return new THREE.Vector3().crossVectors(getForwardHorizontal(), camera.up).normalize();
    }

    function zoomStep(amount) {
      camera.position.addScaledVector(getForwardFull(), amount);
    }

    function moveStep(direction, amount) {
      camera.position.addScaledVector(direction, amount);
    }

    // Associe un bouton à une action répétée tant qu'il est maintenu enfoncé
    // (clic simple = un seul pas, appui maintenu = déplacement continu).
    function bindHoldableButton(button, action) {
      let intervalId = null;

      const start = (e) => {
        e.preventDefault();
        action();
        intervalId = setInterval(action, HOLD_INTERVAL);
        button.classList.add('active');
      };
      const stop = () => {
        if (intervalId !== null) {
          clearInterval(intervalId);
          intervalId = null;
        }
        button.classList.remove('active');
      };

      button.addEventListener('pointerdown', start);
      button.addEventListener('pointerup', stop);
      button.addEventListener('pointerleave', stop);
      button.addEventListener('pointercancel', stop);
    }

    bindHoldableButton(document.getElementById('zoom-in'), () => zoomStep(dynamicStep));
    bindHoldableButton(document.getElementById('zoom-out'), () => zoomStep(-dynamicStep));
    bindHoldableButton(document.getElementById('move-forward'), () => moveStep(getForwardHorizontal(), dynamicStep));
    bindHoldableButton(document.getElementById('move-back'), () => moveStep(getForwardHorizontal(), -dynamicStep));
    bindHoldableButton(document.getElementById('move-left'), () => moveStep(getRightHorizontal(), -dynamicStep));
    bindHoldableButton(document.getElementById('move-right'), () => moveStep(getRightHorizontal(), dynamicStep));

    document.getElementById('move-reset').addEventListener('click', resetToInitialView);

    function flashAt(x, y) {
      const flash = document.getElementById('click-flash');
      flash.style.left = x + 'px';
      flash.style.top = y + 'px';
      flash.style.opacity = '1';
      flash.style.transition = 'none';
      flash.style.transform = 'scale(0.6)';
      requestAnimationFrame(() => {
        flash.style.transition = 'opacity 0.4s ease-out, transform 0.4s ease-out';
        flash.style.opacity = '0';
        flash.style.transform = 'scale(1.4)';
      });
    }

    // ---------- Boucle d'animation ----------

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
  </script>

</body>
</html>
